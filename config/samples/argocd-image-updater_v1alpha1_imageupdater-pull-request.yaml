apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  labels:
    app.kubernetes.io/name: argocd-image-updater
    app.kubernetes.io/managed-by: kustomize
  name: argocd-image-updater-github
  namespace: argocd
spec:
  writeBackConfig:
    method: "git:secret:argocd-image-updater/git-creds"
    # Secret data:
    # kubectl -n argocd-image-updater create secret generic git-creds \
    #  --from-literal=githubAppID=12345 \
    #  --from-literal=githubAppInstallationID=67890 \
    #  --from-literal=githubAppPrivateKey='-----BEGIN RSA PRIVATE KEY-----PRIVATEKEYDATA-----END RSA PRIVATE KEY-----' \
    #  --from-literal=githubAppEnterpriseBaseUrl='https://github.example.com/api/v3' \
    #  --from-literal=insecure='true'
    gitConfig: # Group git-related settings. Should be ignored when writeBackMethod: "argocd"
      pullRequest:
        github: {}
      repository: "git@github.com:example/example.git"
  applicationRefs:
    - namePattern: "app-001"
      images:
        - alias: "nginx"
          imageName: "nginx:1.17.10"
      writeBackConfig:
        method: "git"
        gitConfig:
          branch: "main:image-updater{{range .Images}}-{{.Name}}-{{.NewTag}}{{end}}"
          writeBackTarget: "helmvalues:/helm/config/test-values.yaml" # OR "kustomization:/config/overlays/bar" OR "helmvalues:/{{ .app.path.path }}/values.yaml" - for ApplicationSet.
---
apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  labels:
    app.kubernetes.io/name: argocd-image-updater
    app.kubernetes.io/managed-by: kustomize
  name: argocd-image-updater-gitlab
  namespace: argocd
spec:
  writeBackConfig:
    method: "git:secret:argocd-image-updater/git-creds"
    gitConfig: # Group git-related settings. Should be ignored when writeBackMethod: "argocd"
      pullRequest:
        gitlab:
          insecure: false
          caRef:
            configMapName: argocd-tls-certs-cm
            key: gitlab-ca
      repository: "git@github.com:example/example.git"
  applicationRefs:
    - namePattern: "app-001"
      images:
        - alias: "nginx"
          imageName: "nginx:1.17.10"
      writeBackConfig:
        method: "git"
        gitConfig:
          branch: "main:image-updater{{range .Images}}-{{.Name}}-{{.NewTag}}{{end}}"
          writeBackTarget: "helmvalues:/helm/config/test-values.yaml" # OR "kustomization:/config/overlays/bar" OR "helmvalues:/{{ .app.path.path }}/values.yaml" - for ApplicationSet.

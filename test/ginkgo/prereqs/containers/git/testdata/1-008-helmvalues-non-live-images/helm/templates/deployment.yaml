apiVersion: apps/v1
kind: Deployment
metadata:
  name: manager
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: manager
  template:
    metadata:
      labels:
        app: manager
    spec:
      containers:
      - name: manager
        image: "{{ .Values.manager.image.repository }}:{{ .Values.manager.image.tag }}"

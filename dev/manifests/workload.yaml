# Demo workload. Argo CD is not installed, so sync manually via dev/sync-workload.sh
# after the image-updater patches the Application spec.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: default
  labels:
    app: demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
        - name: demo
          image: 000000000000.dkr.ecr.us-east-1.amazonaws.com/demo-app:dev-initial
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c", "cat /version.txt && sleep infinity"]
